<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  canvas { display:block; width:100%!important; height:100%!important; background:transparent; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
var canvas = document.getElementById('c');
var engine = new BABYLON.Engine(canvas, true, { alpha: true, preserveDrawingBuffer: true });
engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

var scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);

var ip = scene.imageProcessingConfiguration;
ip.toneMappingEnabled = true;
ip.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
ip.exposure = 1.8;
ip.contrast = 1.15;

var camera = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/2, 3.0,
  new BABYLON.Vector3(0, 0.8, 0), scene);
camera.lowerRadiusLimit = camera.upperRadiusLimit = 3.0;
camera.inputs.clear();

var amb = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
amb.intensity = 1.2;
amb.groundColor = new BABYLON.Color3(0.05, 0.1, 0.25);

var dMain = new BABYLON.DirectionalLight('dMain', new BABYLON.Vector3(1,-2,-1), scene);
dMain.diffuse = new BABYLON.Color3(1.0, 0.88, 0.55);
dMain.intensity = 3.0;

var dRim = new BABYLON.DirectionalLight('dRim', new BABYLON.Vector3(-1,-0.3,1.5), scene);
dRim.diffuse = new BABYLON.Color3(0.25, 0.55, 1.0);
dRim.intensity = 2.2;

var pBlue = new BABYLON.PointLight('pBlue', new BABYLON.Vector3(-2,1.2,1), scene);
pBlue.diffuse = new BABYLON.Color3(0.2, 0.5, 1.0);
pBlue.intensity = 3.0; pBlue.range = 8;

var pGold = new BABYLON.PointLight('pGold', new BABYLON.Vector3(0.3,-0.3,2.0), scene);
pGold.diffuse = new BABYLON.Color3(1.0, 0.85, 0.4);
pGold.intensity = 2.0; pGold.range = 5;

var spinAngle = 0;
var spinRoot = null;

BABYLON.SceneLoader.ImportMesh('',
  'https://raw.githubusercontent.com/bogdangodluk22-art/osiris/main/',
  'Meshy_AI_Osiris_Robot.glb',
  scene,
  function(meshes, _p, _s, animGroups) {
    var root = new BABYLON.Mesh('root', scene);
    meshes.forEach(function(m) { if (!m.parent) m.setParent(root); });
    animGroups.forEach(function(ag) { ag.stop(); });

    setTimeout(function() {
      scene.meshes.forEach(function(m) { m.computeWorldMatrix(true); });
      var bb = root.getHierarchyBoundingVectors(true);
      var h = bb.max.y - bb.min.y;
      var sc = (h > 0.01) ? 1.6 / h : 1.0;
      root.scaling = new BABYLON.Vector3(sc, sc, sc);

      scene.meshes.forEach(function(m) { m.computeWorldMatrix(true); });
      bb = root.getHierarchyBoundingVectors(true);
      var cx = (bb.max.x + bb.min.x) / 2;
      var cz = (bb.max.z + bb.min.z) / 2;
      root.position.x = -cx;
      root.position.z = -cz;
      root.position.y = 0.6;
      spinRoot = root;
    }, 80);
  }
);

engine.runRenderLoop(function() {
  if (spinRoot) { spinAngle += 0.008; spinRoot.rotation.y = spinAngle; }
  scene.render();
});

window.addEventListener('resize', function() { engine.resize(); });
</script>
</body>
</html>
